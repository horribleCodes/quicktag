name: Build

on:
  push:
    branches: [main, master, release]
  pull_request:
    branches: [main, master, release]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build QuickTag
        shell: pwsh
        run: ./build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicktag-windows
          path: dist/win/quicktag/

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ExifTool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Build QuickTag
        run: chmod +x build.sh && ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicktag-linux
          path: dist/linux/quicktag/
