name: Build

on:
  push:
    branches: [main, master, release]
  pull_request:
    branches: [main, master, release]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: "Build Windows"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore venv cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml') }}-onnx-v1

      - name: Restore PyInstaller build cache
        uses: actions/cache@v5
        with:
          path: build/quicktag
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('quicktag.spec', 'hooks/**', 'src/quicktag/**') }}-onnx-v1

      - name: Build QuickTag
        shell: pwsh
        run: ./build.ps1

      - name: Smoke test frozen binary
        shell: pwsh
        run: |
          $smoke = Join-Path $env:GITHUB_WORKSPACE "smoke-root"
          $bundleDst = Join-Path $smoke ".cache/huggingface/onnx-export/quicktag--smoke-onnx"
          New-Item -ItemType Directory -Force -Path $bundleDst | Out-Null
          Copy-Item -Path (Join-Path $env:GITHUB_WORKSPACE "tests/fixtures/onnx-smoke-bundle/*") -Destination $bundleDst -Recurse -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $smoke "input") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $smoke "output") | Out-Null
          Copy-Item config.smoke.yaml (Join-Path $smoke "config.yaml") -Force
          Copy-Item tags.example.yaml (Join-Path $smoke "tags.yaml") -Force
          Copy-Item tests/fixtures/sample.png (Join-Path $smoke "input/sample.png") -Force
          $exe = Join-Path $env:GITHUB_WORKSPACE "dist/win/quicktag/quicktag.exe"
          & $exe --help
          & $exe --root $smoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path (Join-Path $smoke "output/sample.png"))) {
            Write-Error "Expected tagged output image was not created"
            exit 1
          }

      - name: Report artifact size
        shell: pwsh
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist/win/quicktag"
          $size = (Get-ChildItem -Path $dist -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host "Windows dist size bytes: $size"

      - name: Upload artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: quicktag-windows
          path: dist/win/quicktag/
          retention-days: 90

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore venv cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml') }}-onnx-v1

      - name: Restore PyInstaller build cache
        uses: actions/cache@v5
        with:
          path: build/quicktag
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('quicktag.spec', 'hooks/**', 'src/quicktag/**') }}-onnx-v1

      - name: Restore ExifTool cache
        uses: actions/cache@v5
        with:
          path: .cache/exiftool
          key: exiftool-${{ runner.os }}-13.59-v1

      - name: Install ExifTool
        run: |
          set -euo pipefail
          version=13.59
          install_dir="$GITHUB_WORKSPACE/.cache/exiftool/Image-ExifTool-${version}"
          if [ ! -x "$install_dir/exiftool" ]; then
            mkdir -p "$GITHUB_WORKSPACE/.cache/exiftool"
            curl -fsSL -L --max-time 120 \
              "https://sourceforge.net/projects/exiftool/files/Image-ExifTool-${version}.tar.gz/download" \
              -o /tmp/exiftool.tar.gz
            tar xzf /tmp/exiftool.tar.gz -C "$GITHUB_WORKSPACE/.cache/exiftool"
          fi
          sudo ln -sf "$install_dir/exiftool" /usr/local/bin/exiftool
          exiftool -ver

      - name: Build QuickTag
        run: chmod +x build.sh && ./build.sh

      - name: Smoke test frozen binary
        run: |
          smoke="$GITHUB_WORKSPACE/smoke-root"
          bundle_dst="$smoke/.cache/huggingface/onnx-export/quicktag--smoke-onnx"
          mkdir -p "$bundle_dst" "$smoke/input" "$smoke/output"
          cp -r tests/fixtures/onnx-smoke-bundle/. "$bundle_dst/"
          cp config.smoke.yaml "$smoke/config.yaml"
          cp tags.example.yaml "$smoke/tags.yaml"
          cp tests/fixtures/sample.png "$smoke/input/sample.png"
          ./dist/linux/quicktag/quicktag --help
          ./dist/linux/quicktag/quicktag --root "$smoke"
          test -f "$smoke/output/sample.png"

      - name: Report artifact size
        run: du -sh dist/linux/quicktag

      - name: Upload artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: quicktag-linux
          path: dist/linux/quicktag/
          retention-days: 90
