name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0); defaults to pyproject.toml on master"
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'master' || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              VERSION="${{ inputs.version }}"
            else
              VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            fi
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi

          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$VERSION" != "$PROJECT_VERSION" ]; then
            echo "Version mismatch: release $VERSION vs pyproject.toml $PROJECT_VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Find successful Build run
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=build.yml \
            --branch=master \
            --commit="${{ steps.version.outputs.commit }}" \
            --status=success \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful Build workflow run found for commit ${{ steps.version.outputs.commit }}"
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: quicktag-linux
          path: quicktag-linux
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find_run.outputs.run_id }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: quicktag-windows
          path: quicktag-windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find_run.outputs.run_id }}

      - name: Package release assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GZIP=-9 tar -czf "quicktag-v${VERSION}-linux.tar.gz" -C quicktag-linux .
          zip -9 -r "quicktag-v${VERSION}-windows.zip" quicktag-windows

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}"; then
            echo "Tag v${VERSION} already exists on remote"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}" "${{ steps.version.outputs.commit }}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ steps.version.outputs.commit }}
          files: |
            quicktag-v${{ steps.version.outputs.version }}-linux.tar.gz
            quicktag-v${{ steps.version.outputs.version }}-windows.zip
          generate_release_notes: true
