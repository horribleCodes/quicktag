name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build QuickTag
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicktag-windows
          path: dist/quicktag/
